<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="xmZeta (Zeta) — MCU firmware">
  <title>xmZeta — ζ — MCU firmware (Zephyr)</title>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="#161B26" stroke="#46B358" stroke-opacity="0.4" stroke-width="2"/>
  <!-- motif: damped oscillation (zeta = damping ratio) -->
  <path d="M40 104 C45 90 51 90 56 104 C60 115 65 115 69 105 C72 99 75 99 78 104 C80 108 83 108 85 104"
        fill="none" stroke="#46B358" opacity="0.7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- hero glyph -->
  <text x="64" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="600" fill="#46B358" text-anchor="middle" dominant-baseline="central">&#950;</text>
</svg>
