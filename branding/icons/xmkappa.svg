<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="xmKappa (Kappa) — PCB / electronics">
  <title>xmKappa — κ — PCB / electronics (KiCAD)</title>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="#161B26" stroke="#E5604D" stroke-opacity="0.4" stroke-width="2"/>
  <!-- motif: PCB trace turning a corner (curvature) into a via/pad -->
  <g stroke="#E5604D" opacity="0.7" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M44 110 H60 Q72 110 72 98 V95"/>
  </g>
  <circle cx="44" cy="110" r="3.2" fill="none" stroke="#E5604D" stroke-width="2.5" opacity="0.7"/>
  <circle cx="72" cy="94" r="2.4" fill="#E5604D" opacity="0.7"/>
  <!-- hero glyph -->
  <text x="64" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="600" fill="#E5604D" text-anchor="middle" dominant-baseline="central">&#954;</text>
</svg>
