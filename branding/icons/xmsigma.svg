<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="xmSigma (Sigma) — runtime foundation">
  <title>xmSigma — Σ — runtime foundation</title>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="#161B26" stroke="#5E6AD2" stroke-opacity="0.4" stroke-width="2"/>
  <!-- motif: stacked foundation layers -->
