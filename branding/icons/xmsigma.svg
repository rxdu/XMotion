    <rect x="38" y="97" width="52" height="3.5" rx="1.75"/>
    <rect x="44" y="104" width="40" height="3.5" rx="1.75"/>
    <rect x="50" y="111" width="28" height="3.5" rx="1.75"/>
  </g>
  <!-- hero glyph -->
  <text x="64" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="600" fill="#5E6AD2" text-anchor="middle" dominant-baseline="central">&#931;</text>
</svg>
