<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XMotion icon explorer</title>
<style>
  :root{--bg:#0e1016;--fg:#e6e9ef;--muted:#8b93a7;--panel:#161b26;--line:#262d3b;--accent:#10B6C6;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);display:flex;height:100vh;overflow:hidden}
  aside{width:312px;flex:0 0 312px;border-right:1px solid var(--line);overflow-y:auto;padding:18px}
  aside h1{font-size:15px;margin:0 0 2px}
  aside .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .group{margin:0 0 18px;border:1px solid var(--line);border-radius:12px;padding:12px}
  .group h3{margin:0 0 10px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0}
  .row label{color:var(--fg);font-size:13px}
  .row .val{color:var(--muted);font-size:12px;font-family:ui-monospace,Menlo,monospace;min-width:34px;text-align:right}
  input[type=range]{width:140px;accent-color:var(--accent)}
  select,button{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13px;cursor:pointer}
  .presets{display:flex;flex-wrap:wrap;gap:6px}.presets button{font-size:12px;padding:5px 9px}
  .seg{display:flex;gap:4px}.seg button{flex:1;padding:6px 4px;font-size:12px}
  .seg button.on{border-color:var(--accent);color:#fff;background:#1b2536}
  main{flex:1;display:flex;flex-direction:column;min-width:0}
  .stagebar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line)}
  .grid{flex:1;overflow:auto;padding:22px;display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));align-content:start}
  .card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
  .card .h{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .card .h .sw{width:11px;height:11px;border-radius:3px}.card .h .cp{margin-left:auto}
  .render{display:flex;gap:16px;align-items:center;justify-content:center;padding:18px;flex-wrap:wrap}
  .render.dark{background:#0e1016}.render.light{background:#f4f5f7}
  .render.check{background-color:#2a2f3a;background-image:linear-gradient(45deg,#222732 25%,transparent 25%),linear-gradient(-45deg,#222732 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222732 75%),linear-gradient(-45deg,transparent 75%,#222732 75%);background-size:18px 18px;background-position:0 0,0 9px,9px -9px,-9px 0}
  .card .v{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}.card .v select{flex:1}
  .out{border-top:1px solid var(--line);background:var(--panel);padding:12px 18px;max-height:30vh;overflow:auto}
  .out .t{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .out .t b{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .out pre{margin:0;font:12px/1.5 ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#cdd3df}
  .copied{color:#46B358;font-size:12px}
</style>
</head>
<body>
<aside>
  <h1>XMotion icon explorer</h1>
  <div class="sub">Scientific motifs by default. Tune the design, pick per-icon diagrams, copy the spec back to me to bake into the real files.</div>
  <div class="group"><h3>Presets</h3><div class="presets" id="presets"></div></div>
  <div class="group"><h3>Palette</h3><div class="seg" id="palette"></div></div>
  <div class="group"><h3>Form</h3>
    <div class="row"><label>Stroke width</label><input type="range" id="stroke" min="2.5" max="6" step="0.25"><span class="val" id="strokeV"></span></div>
    <div class="row"><label>Badge</label><div class="seg" id="badge"></div></div>
    <div class="row"><label>Corner radius</label><input type="range" id="radius" min="14" max="46" step="1"><span class="val" id="radiusV"></span></div>
    <div class="row"><label>Rim opacity</label><input type="range" id="rim" min="0" max="0.8" step="0.05"><span class="val" id="rimV"></span></div>
    <div class="row"><label>Watermark</label><input type="range" id="watermark" min="0" max="0.3" step="0.01"><span class="val" id="watermarkV"></span></div>
  </div>
  <div class="group"><h3>Preview background</h3><div class="seg" id="bg"></div></div>
</aside>
<main>
  <div class="stagebar"><span style="color:var(--muted);font-size:12px">Sizes 112 / 48 / 28 px — check legibility small</span></div>
  <div class="grid" id="grid"></div>
  <div class="out"><div class="t"><b>Design spec</b><button id="copy">Copy spec</button><span class="copied" id="copied"></span></div><pre id="spec"></pre></div>
</main>
<script>
const PALETTES = {
  vivid: ['#5E6AD2','#F2A23A','#10B6C6','#C158DC','#46B358','#E5604D'],
  muted: ['#6F76A8','#C99257','#3F95A0','#A06AB4','#5E9266','#C2705F'],
  neon:  ['#7C8CFF','#FFB23E','#1ED5E5','#E36BFF','#54D96B','#FF6A5A'],
  slate: ['#AEB6C6','#AEB6C6','#AEB6C6','#AEB6C6','#AEB6C6','#AEB6C6'],
};
const ICONS = [
  {id:'xmsigma', sym:'Σ', name:'xmBase', i:0, variants:{covariance:'covariance ellipse', hub:'connected hub', layers:'foundation layers'}},
  {id:'xmmu',    sym:'μ', name:'xmDriver',    i:1, variants:{imu:'IMU (3-axis + gyro)', gauge:'gauge / meter', encoder:'rotary encoder', sensor:'sensor field', bus:'comms bus', canbus:'CAN differential bus', rotor:'rotating motor', motor:'electric motor', pwm:'PWM → motor', hbridge:'H-bridge driver', friction:'friction free-body'}},
  {id:'xmnabla', sym:'∇', name:'xmNavigation', i:2, variants:{vfield:'vector field (sink)', vflow:'flow field to goal', vflowbold:'flow field (bold)', gradient:'gradient on contours', path:'trajectory', triangle:'bold ∇'}},
  {id:'xmgamma', sym:'γ', name:'xmViewer', i:3, variants:{surface:'3D gamma distribution', surfacebold:'3D gamma (bold mesh)', gammacurve:'gamma response curve', window:'viewer window', axes3d:'3D axes'}},
  {id:'xmzeta',  sym:'ζ', name:'xmFirmware',  i:4, variants:{uart:'UART decode view', uartballoon:'UART decode (value)', uartbits:'UART decode (bits)', serial:'serial data frame', txrx:'TX/RX link', canbus:'CAN differential bus', bustopo:'bus topology', fwfile:'firmware image (file)', codewin:'code editor', binary:'binary stream', terminal:'terminal / console', chip:'MCU chip', stepresponse:'2nd-order step response', wave:'damped oscillation'}},
  {id:'xmkappa', sym:'κ', name:'xmBoard', i:5, variants:{pcbfan:'PCB — valid (K-lean)', pcbfan2:'PCB — valid fan-out', pcbbreakout:'PCB — breakout (enriched)', pcbqfp:'PCB — diff-pair (balanced)', schematic:'circuit schematic', osculating:'osculating circle κ=1/R', trace:'trace + via'}},
];
const PAGEBG = {dark:'#0e1016', light:'#f4f5f7', check:'#2a2f3a'};
const DEFAULTS = {
  palette:'vivid', stroke:3.5, badge:'squircle', radius:30, rim:0.4, watermark:0.10, bg:'dark',
  variant:{xmsigma:'hub', xmmu:'imu', xmnabla:'vflow', xmgamma:'surface', xmzeta:'uart', xmkappa:'pcbfan2'}
};
const PRESETS = {
  'Scientific (current)':{...structuredClone(DEFAULTS)},
  'Muted & soft':{palette:'muted', stroke:3.75, radius:32, rim:0.35, watermark:0.08},
  'Mono slate':{palette:'slate', stroke:4, rim:0.3, watermark:0.06},
  'Bold & thick':{stroke:5.25, radius:24, rim:0.55, watermark:0},
  'Functional set':{variant:{xmsigma:'hub', xmmu:'motor', xmnabla:'path', xmgamma:'window', xmzeta:'chip', xmkappa:'pcb'}},
};
let state = structuredClone(DEFAULTS);
const sw = (f=1)=> (state.stroke*f).toFixed(2);
const ko = ()=> state.badge==='none' ? PAGEBG[state.bg] : '#161B26';

function arrow(x1,y1,x2,y2,a,f=1){
  const ang=Math.atan2(y2-y1,x2-x1),h=6.5,a1=ang+2.5,a2=ang-2.5;
  const hx1=(x2+h*Math.cos(a1)).toFixed(1),hy1=(y2+h*Math.sin(a1)).toFixed(1);
  const hx2=(x2+h*Math.cos(a2)).toFixed(1),hy2=(y2+h*Math.sin(a2)).toFixed(1);
  return `<path d="M${x1} ${y1} L${x2} ${y2} M${x2} ${y2} L${hx1} ${hy1} M${x2} ${y2} L${hx2} ${hy2}" stroke="${a}" stroke-width="${sw(f)}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
}
function gearPath(cx,cy,ro,ri,teeth){let p='',step=Math.PI/teeth;
  for(let i=0;i<teeth*2;i++){const r=i%2?ri:ro,ang=i*step-Math.PI/2;p+=(i?'L':'M')+(cx+r*Math.cos(ang)).toFixed(1)+' '+(cy+r*Math.sin(ang)).toFixed(1)+' ';}return p+'Z';}
function dampedWave(a){let p='',e1='',e2='',x0=38,y0=62,A=22,k=0.045,w=0.34;
  for(let x=x0;x<=92;x+=2){const env=A*Math.exp(-k*(x-x0));
    p+=(x===x0?'M':'L')+x+' '+(y0+env*Math.sin(w*(x-x0))).toFixed(1)+' ';
    e1+=(x===x0?'M':'L')+x+' '+(y0-env).toFixed(1)+' ';e2+=(x===x0?'M':'L')+x+' '+(y0+env).toFixed(1)+' ';}
  return `<path d="${e1}" stroke="${a}" stroke-width="${sw(.55)}" stroke-dasharray="2 4" fill="none" opacity="0.6"/><path d="${e2}" stroke="${a}" stroke-width="${sw(.55)}" stroke-dasharray="2 4" fill="none" opacity="0.6"/><path d="${p}" stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linecap="round"/>`;}
function stepResponse(a){const x0=40,x1=94,y0=84,yss=54,zeta=0.22,wn=0.42,wd=wn*Math.sqrt(1-zeta*zeta);let p='';
  for(let x=x0;x<=x1;x+=1.5){const t=x-x0,env=Math.exp(-zeta*wn*t);
    const r=1-env*(Math.cos(wd*t)+(zeta*wn/wd)*Math.sin(wd*t));
    p+=(x===x0?'M':'L')+x+' '+(y0-(y0-yss)*r).toFixed(1)+' ';}
  return `<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M40 36 V84 H96" stroke-width="${sw(.8)}"/><path d="M40 ${yss} H94" stroke-width="${sw(.5)}" stroke-dasharray="3 4"/><path d="${p}" stroke-width="${sw()}"/></g>`;}

const M = {
  xmsigma:{
    covariance:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="64" cy="60" rx="31" ry="18" transform="rotate(-27 64 60)" stroke-width="${sw()}"/><path d="M37 74 L91 46 M56 44 L72 76" stroke-width="${sw(.6)}"/></g><circle cx="64" cy="60" r="3" fill="${a}"/><g fill="${a}" opacity="0.5"><circle cx="50" cy="53" r="1.8"/><circle cx="79" cy="66" r="1.8"/><circle cx="73" cy="49" r="1.8"/><circle cx="55" cy="70" r="1.8"/></g>`,
    hub:a=>`<g stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M64 60 L40 40 M64 60 L88 40 M64 60 L40 82 M64 60 L88 82"/><rect x="53" y="49" width="22" height="22" rx="5" fill="${ko()}"/></g><g fill="${a}"><circle cx="40" cy="40" r="5"/><circle cx="88" cy="40" r="5"/><circle cx="40" cy="82" r="5"/><circle cx="88" cy="82" r="5"/></g>`,
    layers:a=>`<g stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="34" y="40" width="60" height="16" rx="4"/><rect x="40" y="61" width="48" height="15" rx="4"/><rect x="46" y="81" width="36" height="13" rx="4"/></g>`,
  },
  xmmu:{
    imu:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round">${arrow(62,67,62,40,a,0.72)}${arrow(62,67,85,80,a,0.72)}${arrow(62,67,39,80,a,0.72)}<ellipse cx="62" cy="56" rx="10" ry="4" stroke-width="${sw(.62)}"/><path d="M72 56 l-3.5 -2 M72 56 l-2.5 4" stroke-width="${sw(.7)}"/></g><path d="M62 62 L68 67 L62 72 L56 67 Z" fill="${a}"/>`,
    gauge:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><path d="M38 74 A 26 26 0 0 1 90 74"/><g stroke-width="${sw(.7)}"><path d="M38 74 l6 -1 M46 56 l4 -4 M64 48 v6 M82 56 l-4 -4 M90 74 l-6 -1"/></g><path d="M64 74 L80 56"/></g><circle cx="64" cy="74" r="3.2" fill="${a}"/>`,
    encoder:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><circle cx="58" cy="58" r="22"/><circle cx="58" cy="58" r="4"/><g stroke-width="${sw(.7)}">${Array.from({length:12},(_,k)=>{const ang=k*Math.PI/6,x1=58+16*Math.cos(ang),y1=58+16*Math.sin(ang),x2=58+21*Math.cos(ang),y2=58+21*Math.sin(ang);return `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}"/>`;}).join('')}</g><rect x="82" y="50" width="10" height="16" rx="2"/></g>`,
    bus:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><path d="M26 68 H102"/><path d="M26 61 V75 M102 61 V75"/><path d="M44 68 V52 M64 68 V52 M84 68 V52"/><rect x="37" y="40" width="14" height="12" rx="2"/><rect x="57" y="40" width="14" height="12" rx="2"/><rect x="77" y="40" width="14" height="12" rx="2"/></g><g fill="${a}"><circle cx="44" cy="68" r="2.6"/><circle cx="64" cy="68" r="2.6"/><circle cx="84" cy="68" r="2.6"/></g>`,
    canbus:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><path d="M26 56 H56 L70 68 H98"/><path d="M26 68 H56 L70 56 H98"/><path d="M98 56 l-4 2 l8 3 l-8 3 l8 3 l-4 1"/></g><rect x="38" y="50" width="12" height="24" rx="2" stroke="${a}" stroke-width="${sw(.85)}" fill="${ko()}"/>`,
    sensor:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><rect x="30" y="50" width="20" height="28" rx="3"/><path d="M37 78 v7 M44 78 v7"/></g><g stroke="${a}" fill="none" stroke-linecap="round"><path d="M58 48 A 22 22 0 0 1 58 80" stroke-width="${sw(.85)}"/><path d="M68 43 A 31 31 0 0 1 68 85" stroke-width="${sw(.7)}"/><path d="M78 39 A 39 39 0 0 1 78 89" stroke-width="${sw(.55)}"/></g>`,
    rotor:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><circle cx="64" cy="58" r="6"/><path d="M64 52 V43 M58.8 61 L50.5 66 M69.2 61 L77.5 66"/><path d="M44 50 A 22 22 0 0 1 84 50" stroke-width="${sw(.85)}"/><path d="M84 50 l-6.5 -1.5 M84 50 l1.5 6.5"/><path d="M84 66 A 22 22 0 0 1 44 66" stroke-width="${sw(.85)}"/><path d="M44 66 l6.5 1.5 M44 66 l-1.5 -6.5"/><path d="M58 82 v8 M70 82 v8"/></g>`,
    hbridge:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><path d="M38 40 H90 M38 86 H90 M38 40 V86 M90 40 V86 M38 63 H56 M72 63 H90"/><circle cx="64" cy="63" r="8"/><rect x="34" y="48" width="8" height="8" rx="1.5" fill="${ko()}"/><rect x="34" y="70" width="8" height="8" rx="1.5" fill="${ko()}"/><rect x="86" y="48" width="8" height="8" rx="1.5" fill="${ko()}"/><rect x="86" y="70" width="8" height="8" rx="1.5" fill="${ko()}"/></g>`,
    pwm:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw()}"><circle cx="78" cy="56" r="18"/><path d="M26 56 H33 V47 H40 V56 H47 V47 H54 V56 H60"/><path d="M71 74 v10 M85 74 v10"/></g><circle cx="78" cy="56" r="3.2" fill="${a}"/>`,
    friction:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M30 80 H98" stroke-width="${sw()}"/><g stroke-width="${sw(.55)}"><path d="M36 80 l-5 6"/><path d="M48 80 l-5 6"/><path d="M60 80 l-5 6"/><path d="M72 80 l-5 6"/><path d="M84 80 l-5 6"/></g><rect x="53" y="56" width="22" height="22" rx="2" stroke-width="${sw()}"/></g>${arrow(64,56,64,37,a)}${arrow(53,67,37,67,a)}${arrow(75,67,91,67,a)}`,
    motor:a=>`<g stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="64" cy="56" r="24"/><circle cx="64" cy="56" r="7.5"/><g stroke-width="${sw(.75)}"><path d="M64 36 v6 M64 76 v-6 M44 56 h6 M84 56 h-6"/><path d="M50 42 l4 4 M78 42 l-4 4 M50 70 l4 -4 M78 70 l-4 -4"/></g><path d="M56 79 v11 M72 79 v11"/></g>`,
    gear:a=>`<path d="${gearPath(64,58,24,17,9)}" stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linejoin="round"/><circle cx="64" cy="58" r="8" stroke="${a}" stroke-width="${sw()}" fill="none"/><g stroke="${a}" stroke-width="${sw()}" stroke-linecap="round"><path d="M56 84 v8 M72 84 v8"/></g>`,
  },
  xmnabla:{
    vfield:a=>{const c=64,pts=[[42,42],[64,40],[86,42],[40,64],[88,64],[42,86],[64,88],[86,86]];let s='';for(const[gx,gy]of pts){const dx=c-gx,dy=c-gy,r=Math.hypot(dx,dy),ux=dx/r,uy=dy/r,L=Math.min(13,6+r*0.3),tx=gx+ux*L,ty=gy+uy*L;s+=`<path d="M${gx} ${gy} L${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*5-uy*4).toFixed(1)} ${(-uy*5+ux*4).toFixed(1)} M${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*5+uy*4).toFixed(1)} ${(-uy*5-ux*4).toFixed(1)}"/>`;}return `<g stroke="${a}" stroke-width="${sw(.85)}" fill="none" stroke-linecap="round" stroke-linejoin="round">${s}</g><circle cx="64" cy="64" r="3.4" fill="${a}"/>`;},
    vflow:a=>{const F=[63,114],rows=[[42,[36,54,72,90]],[60,[45,63,81]],[78,[54,72]],[94,[63]]];let s='';for(const[y,xs]of rows)for(const x of xs){const dx=F[0]-x,dy=F[1]-y,r=Math.hypot(dx,dy),ux=dx/r,uy=dy/r,L=14,x1=x-ux*L/2,y1=y-uy*L/2,tx=x1+ux*L,ty=y1+uy*L;s+=`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*5-uy*4).toFixed(1)} ${(-uy*5+ux*4).toFixed(1)} M${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*5+uy*4).toFixed(1)} ${(-uy*5-ux*4).toFixed(1)}"/>`;}return `<g stroke="${a}" stroke-width="${sw(.9)}" fill="none" stroke-linecap="round" stroke-linejoin="round">${s}</g>`;},
    vflowbold:a=>{const F=[64,116],rows=[[46,[40,64,88]],[70,[52,76]],[92,[64]]];let s='';for(const[y,xs]of rows)for(const x of xs){const dx=F[0]-x,dy=F[1]-y,r=Math.hypot(dx,dy),ux=dx/r,uy=dy/r,L=18,x1=x-ux*L/2,y1=y-uy*L/2,tx=x1+ux*L,ty=y1+uy*L;s+=`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*6-uy*5).toFixed(1)} ${(-uy*6+ux*5).toFixed(1)} M${tx.toFixed(1)} ${ty.toFixed(1)} l${(-ux*6+uy*5).toFixed(1)} ${(-uy*6-ux*5).toFixed(1)}"/>`;}return `<g stroke="${a}" stroke-width="${sw(1.15)}" fill="none" stroke-linecap="round" stroke-linejoin="round">${s}</g>`;},
    gradient:a=>`<g stroke="${a}" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="${sw(.8)}"><ellipse cx="61" cy="60" rx="30" ry="22"/><ellipse cx="61" cy="60" rx="19" ry="14"/><ellipse cx="61" cy="60" rx="8" ry="6"/></g>${arrow(61,60,92,42,a)}`,
    field:a=>arrow(46,42,55,60,a)+arrow(64,38,64,58,a)+arrow(82,42,73,60,a)+`<circle cx="64" cy="72" r="4" fill="${a}"/>`,
    path:a=>`<g stroke="${a}" stroke-width="${sw()}" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M34 92 C 46 62 56 80 66 58 S 86 40 92 34"/><circle cx="55" cy="65" r="3.5" fill="${ko()}"/><circle cx="78" cy="47" r="3.5" fill="${ko()}"/></g><g fill="${a}"><circle cx="34" cy="92" r="5"/><circle cx="92" cy="34" r="2.5"/></g><circle cx="92" cy="34" r="8.5" stroke="${a}" stroke-width="${sw()}" fill="none"/>`,
    triangle:a=>`<path d="M40 44 H88 L64 88 Z" fill="none" stroke="${a}" stroke-width="${(state.stroke*1.7).toFixed(2)}" stroke-linejoin="round"/>`,

}

function watermark(sym,a){if(state.watermark<=0)return'';const o=WMOFF[sym]||[0,0],sz=WMSIZE[sym]||92,f=sz/92,op=Math.min(1,state.watermark*(WMOP[sym]||1));return `<text x="${(64+o[0]*f).toFixed(1)}" y="${(64+o[1]*f).toFixed(1)}" font-family="Georgia,serif" font-size="${sz}" font-weight="700" fill="${a}" opacity="${op.toFixed(3)}" text-anchor="middle" dominant-baseline="central">${sym}</text>`;}
function svgFor(icon,size){const a=PALETTES[state.palette][icon.i],v=state.variant[icon.id];
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="${size}" height="${size}">${badge(a)}${watermark(icon.sym,a)}${M[icon.id][v](a)}</svg>`;}

const grid=document.getElementById('grid');
function renderGrid(){
  grid.innerHTML='';
  ICONS.forEach(ic=>{
    const a=PALETTES[state.palette][ic.i];
    const opts=Object.entries(ic.variants).map(([k,label])=>`<option value="${k}" ${state.variant[ic.id]===k?'selected':''}>${label}</option>`).join('');
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="h"><span class="sw" style="background:${a}"></span><b>${ic.name}</b> <span style="color:var(--muted)">${ic.sym}</span><span class="cp"><button data-copy="${ic.id}" style="padding:3px 7px;font-size:11px">copy svg</button></span></div><div class="render ${state.bg}">${svgFor(ic,112)}${svgFor(ic,48)}${svgFor(ic,28)}</div><div class="v"><select data-var="${ic.id}">${opts}</select></div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('[data-var]').forEach(s=>s.onchange=e=>{state.variant[e.target.dataset.var]=e.target.value;updateAll();});
  grid.querySelectorAll('[data-copy]').forEach(b=>b.onclick=e=>{const ic=ICONS.find(i=>i.id===e.target.dataset.copy);navigator.clipboard.writeText(svgFor(ic,128));e.target.textContent='copied!';setTimeout(()=>e.target.textContent='copy svg',1200);});
}
function spec(){
  const p=[];
  if(state.palette!==DEFAULTS.palette) p.push(`the ${state.palette} palette`);
  if(state.stroke!==DEFAULTS.stroke) p.push(`stroke width ${state.stroke}`);
  if(state.badge!==DEFAULTS.badge) p.push(`a ${state.badge} badge`); else if(state.radius!==DEFAULTS.radius) p.push(`corner radius ${state.radius}`);
  if(state.rim!==DEFAULTS.rim) p.push(`rim opacity ${state.rim}`);
  if(state.watermark!==DEFAULTS.watermark) p.push(state.watermark<=0?'no symbol watermark':`watermark opacity ${state.watermark}`);
  const vch=ICONS.filter(ic=>state.variant[ic.id]!==DEFAULTS.variant[ic.id]).map(ic=>`${ic.name}=${state.variant[ic.id]}`);
  let txt = (p.length||vch.length) ? `Update the XMotion icons: use ${p.length?p.join(', '):'the default form'}` : 'Keep the current default design (scientific motifs)';
  if(vch.length) txt += `${p.length?'; ':' with '}motif variants ${vch.join(', ')}`;
  txt+='.';
  const cfg={palette:state.palette,stroke:state.stroke,badge:state.badge,radius:state.radius,rim:state.rim,watermark:state.watermark,variant:state.variant};
  return txt+'\n\n```json\n'+JSON.stringify(cfg,null,2)+'\n```';
}
function updateAll(){
  document.documentElement.style.setProperty('--accent', PALETTES[state.palette][2]);
  renderGrid();
  document.getElementById('spec').textContent=spec();
  strokeV.textContent=state.stroke;radiusV.textContent=state.radius;rimV.textContent=state.rim;watermarkV.textContent=state.watermark;
  document.querySelectorAll('#badge button').forEach(b=>b.classList.toggle('on',b.dataset.v===state.badge));
  document.querySelectorAll('#bg button').forEach(b=>b.classList.toggle('on',b.dataset.v===state.bg));
  document.querySelectorAll('#palette button').forEach(b=>b.classList.toggle('on',b.dataset.v===state.palette));
}
function seg(host,values,key){host.innerHTML=values.map(v=>`<button data-v="${v}">${v}</button>`).join('');host.querySelectorAll('button').forEach(b=>b.onclick=()=>{state[key]=b.dataset.v;updateAll();});}
seg(document.getElementById('palette'),Object.keys(PALETTES),'palette');
seg(document.getElementById('badge'),['squircle','circle','none'],'badge');
seg(document.getElementById('bg'),['dark','light','check'],'bg');
const bind=(id,key)=>{const el=document.getElementById(id);el.value=state[key];el.oninput=()=>{state[key]=parseFloat(el.value);updateAll();};};
['stroke','radius','rim','watermark'].forEach(k=>bind(k,k));
const presetHost=document.getElementById('presets');
presetHost.innerHTML=Object.keys(PRESETS).map(n=>`<button>${n}</button>`).join('');
presetHost.querySelectorAll('button').forEach(b=>b.onclick=()=>{state=structuredClone(DEFAULTS);Object.assign(state,structuredClone(PRESETS[b.textContent]));if(!state.variant)state.variant=structuredClone(DEFAULTS.variant);['stroke','radius','rim','watermark'].forEach(k=>document.getElementById(k).value=state[k]);updateAll();});
document.getElementById('copy').onclick=()=>{navigator.clipboard.writeText(document.getElementById('spec').textContent);const c=document.getElementById('copied');c.textContent='Copied — paste this back to Claude';setTimeout(()=>c.textContent='',2500);};
updateAll();
</script>
</body>
</html>
