name: Assembly

# Validates that the umbrella superbuild assembles the pinned components and
# builds them together — the cross-component integration each component's own
# CI cannot catch on its own. The assembled set is the components whose
# renames/migrations are mutually consistent (ADR 0003 lockstep):
#   - xmBase + xmDriver build; xmTelemetry is cloned (pin/wiring validated)
#     but stays TELEMETRY=OFF until the pinned xmBase carries the telemetry
#     API it builds against (xmBase PR #18).
#   - xmNavigation returns when its HAL migration lands (it still includes
#     pre-redesign xmDriver headers, e.g. xmdriver/hal/*_interface.hpp).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  assemble:
    name: Assemble (base + driver)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # components/telemetry is a PRIVATE repo: its clone authenticates over
      # SSH with a read-only deploy key. The insteadOf rewrite is scoped to
      # exactly that URL — deploy keys authorize a single repo, and the
      # public siblings stay on anonymous https.
      - name: Set up deploy key for the private telemetry submodule
        env:
          XMTELEMETRY_KEY: ${{ secrets.XMTELEMETRY_DEPLOYMENT_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$XMTELEMETRY_KEY" > ~/.ssh/id_xmtelemetry
          chmod 600 ~/.ssh/id_xmtelemetry
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global core.sshCommand "ssh -i ~/.ssh/id_xmtelemetry -o IdentitiesOnly=yes"
          git config --global url."git@github.com:rxdu/xmTelemetry.git".insteadOf "https://github.com/rxdu/xmTelemetry.git"

      # Init exactly the components this job assembles (viewer and navigation
      # are not built here — see the header comment).
      - name: Init component submodules (built set)
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive \
            components/base components/driver components/telemetry

      - name: Install dependencies (union of component deps)
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libeigen3-dev libspdlog-dev libasio-dev libmodbus-dev libevent-dev \
            libevdev-dev libgl1-mesa-dev libglfw3-dev libcairo2-dev libtbb-dev \
            libboost-all-dev libgsl-dev libopencv-dev libyaml-cpp-dev \
            libncurses-dev libpcl-dev libglm-dev

      - name: Configure assembly (base + driver)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE
          -DXMOTION_WITH_NAVIGATION=OFF -DENABLE_VISUALIZATION=OFF

      - name: Build
        run: cmake --build build -j
